name: guard-approval

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed, edited]
  schedule:
    - cron: "0 */6 * * *" # optional: periodic reconciliation

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  reconcile-label:
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile DO-NOT-MERGE label based on fresh approvals
        id: reconcile
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const number = context.payload.pull_request?.number
              ?? context.payload.issue?.number;

            if (!number) {
              core.info("No pull request number found; skipping.");
              return;
            }

            // 1) Ensure the label exists
            const LABEL_NAME = "DO-NOT-MERGE";
            const LABEL_COLOR = "d73a4a";
            try {
              await github.rest.issues.getLabel({ owner, repo, name: LABEL_NAME });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: LABEL_NAME, color: LABEL_COLOR,
                  description: "Auto-applied until ≥1 peer approval is present (and fresh after latest commit)"
                });
              } else {
                throw e;
              }
            }

            // 2) Read PR info
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: number });
            const author = pr.user.login;
            const headSha = pr.head.sha;

            // Latest commit time for the PR head
            const { data: headCommit } = await github.rest.repos.getCommit({
              owner, repo, ref: headSha
            });
            // Prefer author/committer date; commit.committer?.date is usually reliable
            const latestCommitISO =
              headCommit.commit?.committer?.date ||
              headCommit.commit?.author?.date ||
              pr.updated_at;
            const latestCommitTime = new Date(latestCommitISO).getTime();

            // 3) Gather reviews and take the *latest per reviewer*
            const allReviews = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.pulls.listReviews({
                owner, repo, pull_number: number, per_page: 100, page
              });
              if (!data.length) break;
              allReviews.push(...data);
              if (data.length < 100) break;
              page++;
            }

            const latestByUser = new Map();
            for (const r of allReviews) {
              const login = r.user?.login;
              if (!login) continue;
              const prev = latestByUser.get(login);
              if (!prev || new Date(r.submitted_at) > new Date(prev.submitted_at)) {
                latestByUser.set(login, r);
              }
            }

            // 4) "Fresh" approval = APPROVED by non-author AND submitted after the latest commit time
            const freshApproved = Array.from(latestByUser.values()).some(r => {
              const t = new Date(r.submitted_at).getTime();
              return r.state?.toUpperCase() === "APPROVED" && r.user?.login !== author && t > latestCommitTime;
            });

            const hasLabel = pr.labels.some(l => (l.name || l) === LABEL_NAME);

            if (freshApproved) {
              // Remove label if present
              if (hasLabel) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: number, name: LABEL_NAME
                }).catch(() => {});
                await github.rest.issues.createComment({
                  owner, repo, issue_number: number,
                  body: "✅ Detected **fresh approval** after the latest commit. Removing `DO-NOT-MERGE`."
                });
              }
              core.setOutput("approved", "true");
            } else {
              // Add/keep label if there is no fresh approval
              if (!hasLabel) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: number, labels: [LABEL_NAME]
                });
                const why = allReviews.length
                  ? "No **fresh** approval after the latest commit."
                  : "No approvals yet.";
                await github.rest.issues.createComment({
                  owner, repo, issue_number: number,
                  body: `⛔ ${why} Labeling as \`DO-NOT-MERGE\` until at least one teammate approves **after the most recent push**.`
                });
              } else if (context.eventName === "pull_request" && context.payload.action === "synchronize") {
                // New commits pushed; remind even if label already present
                await github.rest.issues.createComment({
                  owner, repo, issue_number: number,
                  body: "🔁 New commits pushed. Previous approvals are considered **stale**. `DO-NOT-MERGE` stays until a **fresh** approval is given."
                });
              }
              core.setOutput("approved", "false");
            }

      - name: Initial reminder on open
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'opened' && steps.reconcile.outputs.approved == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const number = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner, repo, issue_number: number,
              body: "👋 Friendly reminder: our team rule is **no merge to `main` without ≥1 peer approval** (must be **after** the latest commit)."
            });
